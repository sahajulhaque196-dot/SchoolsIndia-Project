name: Deploy Schoolspedia to Cloudflare R2 + Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas
          pip install boto3

      - name: Download CSV files from GitHub Release
        run: |
          wget -q "https://github.com/sahajulhaque196-dot/SchoolsIndia-Project/releases/download/v1.0/schools.csv" -O schools.csv
          wget -q "https://github.com/sahajulhaque196-dot/SchoolsIndia-Project/releases/download/v1.0/LocalDataHub_Village_Master_v2.csv" -O LocalDataHub_Village_Master_v2.csv
          echo "CSVs downloaded!"
          ls -lh *.csv

      - name: Generate school pages
        run: |
          python generator/generator.py \
            --input schools.csv \
            --village LocalDataHub_Village_Master_v2.csv \
            --output output
        timeout-minutes: 300

      - name: Copy policy pages to output
        run: |
          mkdir -p output/about && cp pages/about.html output/about/index.html
          mkdir -p output/privacy && cp pages/privacy.html output/privacy/index.html
          mkdir -p output/disclaimer && cp pages/disclaimer.html output/disclaimer/index.html
          mkdir -p output/terms && cp pages/terms.html output/terms/index.html
          mkdir -p output/contact && cp pages/contact.html output/contact/index.html
          cp -r articles output/articles
          echo "Total files:"
          find output -type f | wc -l

      - name: Upload to Cloudflare R2
        run: |
          python3 << 'PYEOF'
          import boto3, os, mimetypes
          from botocore.config import Config

          R2_ACCOUNT_ID = os.environ['R2_ACCOUNT_ID']
          R2_ACCESS_KEY = os.environ['R2_ACCESS_KEY']
          R2_SECRET_KEY = os.environ['R2_SECRET_KEY']
          BUCKET = 'schoolspedia'
          OUTPUT_DIR = 'output'

          s3 = boto3.client(
              's3',
              endpoint_url=f'https://{R2_ACCOUNT_ID}.r2.cloudflarestorage.com',
              aws_access_key_id=R2_ACCESS_KEY,
              aws_secret_access_key=R2_SECRET_KEY,
              config=Config(signature_version='s3v4'),
              region_name='auto'
          )

          uploaded = 0
          errors = 0

          for root, dirs, files in os.walk(OUTPUT_DIR):
              for fname in files:
                  local_path = os.path.join(root, fname)
                  # Key = path relative to output folder
                  key = os.path.relpath(local_path, OUTPUT_DIR).replace('\\', '/')
                  
                  # Content type
                  ct, _ = mimetypes.guess_type(fname)
                  if not ct:
                      ct = 'application/octet-stream'
                  if fname.endswith('.html'):
                      ct = 'text/html; charset=utf-8'
                  elif fname.endswith('.css'):
                      ct = 'text/css'
                  elif fname.endswith('.js'):
                      ct = 'application/javascript'
                  elif fname.endswith('.xml'):
                      ct = 'application/xml'
                  elif fname.endswith('.txt'):
                      ct = 'text/plain'

                  try:
                      s3.upload_file(
                          local_path, BUCKET, key,
                          ExtraArgs={
                              'ContentType': ct,
                              'CacheControl': 'public, max-age=86400'
                          }
                      )
                      uploaded += 1
                      if uploaded % 10000 == 0:
                          print(f'Uploaded {uploaded:,} files...')
                  except Exception as e:
                      errors += 1
                      if errors < 5:
                          print(f'Error: {key} — {e}')

          print(f'Done! Uploaded {uploaded:,} files. Errors: {errors}')
          PYEOF
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}

      - name: Done
        run: echo "All files uploaded to R2! Website is live."
